 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawrence Dave Corral | Certificates</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        .font-matrix { font-family: 'VT323', monospace; }

        .matrix-glow {
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
        }

         .animate-scan {
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .bg-scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 65, 0.05) 50%);
            background-size: 100% 4px;
        }

    </style>
</head>

<body class="bg-black text-gray-300 font-mono antialiased min-h-screen">

    <div class="fixed inset-0 -z-10 overflow-hidden">
        <img src="images/certificates/cert-matrix.jpg" alt="Background" class="w-full h-full object-cover opacity-30">
    </div>

     <div class="flex flex-col items-center p-6 md:p-12">
        
     <header class="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center border-b border-green-900/50 pb-4 mb-12">
            <span class="text-xl font-bold tracking-widest text-green-500 matrix-glow">
                CORRAL
            </span>
            <nav class="flex gap-6 text-sm mt-4 md:mt-0 uppercase">
                <a href="index.html" class="hover:text-green-400 transition-colors">HOME</a>
                <a href="about.html" class="hover:text-green-400 transition-colors">About</a>
                <a href="stacks.html" class="hover:text-green-400 transition-colors">Stacks</a>
                <a href="certificate.html" class="hover:text-green-400 transition-colors">Certificates</a>
            </nav>
        </header>


        <main class="w-full max-w-6xl">
            <div class="flex flex-wrap justify-center items-start gap-12 md:gap-16">

                <div class="flex flex-col items-center group w-72">
                    <div class="relative border-2 border-green-900 p-4 bg-black/80 overflow-hidden hover:border-green-500 transition-all duration-500 shadow-2xl hover:shadow-green-500/20">
                        <div class="absolute left-0 w-full h-[1px] bg-green-400/50 z-10 animate-scan"></div>
                        <img src="images/certificates/cert-ppt-badge.png" alt="PowerPoint Badge" 
                             class="w-full h-64 object-contain cursor-pointer"
                             onclick="showLightbox('images/certificates/cert-ppt.jpg')">
                    </div>
                    <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank" 
                       class="text-green-500 text-[13px] font-bold mt-6 tracking-tighter text-center uppercase hover:underline">
                        > VERIFICATION: PPT Associate Certificate
                    </a>
                </div>
                
                <div class="flex flex-col items-center group w-72">
                    <div class="relative border-2 border-green-900 p-4 bg-black/80 overflow-hidden hover:border-green-500 transition-all duration-500 shadow-2xl hover:shadow-green-500/20">
                        <div class="absolute left-0 w-full h-[1px] bg-green-400/50 z-10 animate-scan"></div>
                        <img src="images/certificates/cert-word-badge.png" alt="Word Badge" 
                             class="w-full h-64 object-contain cursor-pointer"
                             onclick="showLightbox('images/certificates/cert-word.jpg')">
                    </div>
                    <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank" 
                       class="text-green-500 text-[13px] font-bold mt-6 tracking-tighter text-center uppercase hover:underline">
                        > VERIFICATION: MS Word Associate Certificate
                    </a>
                </div>

                 <div class="flex flex-col items-center group w-72">
                    <div class="relative border-2 border-green-900 p-4 bg-black/80 overflow-hidden hover:border-green-500 transition-all duration-500 shadow-2xl hover:shadow-green-500/20">
                        <div class="absolute left-0 w-full h-[1px] bg-green-400/50 z-10 animate-scan"></div>
                        <img src="images/certificates/cert-java-badge.png" alt="Java Badge" 
                             class="w-full h-64 object-contain cursor-pointer"
                             onclick="showLightbox('images/certificates/cert-java.jpg')">
                    </div>
                    <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank" 
                       class="text-green-500 text-[13px] font-bold mt-6 tracking-tighter text-center uppercase hover:underline">
                        > VERIFICATION: Java Certificate
                    </a>
                </div>
        </main>

    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 cursor-pointer" onclick="this.classList.add('hidden')">
        <img id="lb-img" src="" class="max-w-full max-h-[80vh] border border-green-500 shadow-lg shadow-green-500/20">
        <p class="mt-4 text-green-500 text-[10px] tracking-widest uppercase">Click to close</p>
    </div>

 <script>
        function showLightbox(src) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').classList.remove('hidden');
        }
    </script>

</body>
</html>

                </div>
        </main>
    </div>

   
</body>
</html>
