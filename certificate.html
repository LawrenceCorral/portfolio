                <div class="flex flex-col items-center group w-72">

    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 cursor-pointer" onclick="this.classList.add('hidden')">
        <img id="lb-img" src="" class="max-w-full max-h-[80vh] border border-green-500 shadow-lg shadow-green-500/20">
