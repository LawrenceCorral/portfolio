 <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Stacks | Lawrence Dave Corral</title>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
            <script src="https://cdn.tailwindcss.com"></script>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700&family=VT323&display=swap" rel="stylesheet">
    <style>

    .matrix-glow {
        text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
        }

    .font-matrix { font-family: 'VT323', monospace; }
    .font-cyber { font-family: 'Orbitron', sans-serif; }
    .font-jetbrains { font-family: 'JetBrains Mono', monospace; }

    .animate-scan {
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .bg-scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 65, 0.05) 50%);
            background-size: 100% 4px;
        }
    
    </style>

        </head>

    <body class="bg-black text-gray-300 font-mono antialiased min-h-screen">

    <div id="vanta-bg" class="fixed inset-0 -z-10 overflow-hidden">
    <img src="images/stacks/stacks-matrix.jpg" alt="Background" class="w-full h-full object-cover opacity-10">
    </div>


  <div class="flex flex-col items-center p-6 md:p-12">
        
    <header class="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center border-b border-green-900/50 pb-4 mb-12">
    <span class="text-3xl font-matrix tracking-widest text-white-500 matrix-glow">CORRAL</span>    
            <nav class="flex gap-6 text-sm mt-4 md:mt-0 uppercase">
                <a href="index.html" class="hover:text-green-400 transition-colors font-jetbrains">HOME</a>
                <a href="about.html" class="hover:text-green-400 transition-colors font-jetbrains">About</a>
                <a href="stacks.html" class="hover:text-green-400 transition-colors font-jetbrains">Stacks</a>
                <a href="certificate.html" class="hover:text-green-400 transition-colors font-jetbrains">Certificates</a>
            </nav>
        </header>

    <main class="w-full max-w-6xl mx-auto">
            <h2 class="text-green-500 font-matrix text-2xl mb-8 tracking-widest uppercase">> Languages</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
                
                <div class="relative rounded-md overflow-hidden bg-black/80 border border-green-400 transition-all duration-300 cursor-default hover:border-white">
                    <div class="absolute inset-0 pointer-events-none overflow-hidden">
                        <div class="absolute w-full h-[2px] bg-green-500/40 animate-scan shadow-[0_0_8px_#00ff41]"></div>
                        <div class="absolute inset-0 bg-scanlines opacity-20"></div>
                    </div>
                    <div class="h-32 flex items-center justify-center bg-green-900/10 border-b border-green-900/30 ">
                        <img class="w-16 h-16 object-contain scale-110" src="images/stacks/stacks-java.png" alt="Java">
                    </div>
                    <div class="px-6 py-4 text-center">
                        <div class="font-bold text-green-500 text-xl font-cyber tracking-widest matrix-glow">JAVA</div>
                    </div>
                </div>

                <div class="relative rounded-md overflow-hidden bg-black/80 border border-green-400 transition-all duration-300 cursor-default shadow-[0_0_10px_rgba(0,255,65,0.1)]">
                    <div class="absolute inset-0 pointer-events-none overflow-hidden">
                        <div class="absolute w-full h-[2px] bg-green-500/40 animate-scan shadow-[0_0_8px_#00ff41]"></div>
                        <div class="absolute inset-0 bg-scanlines opacity-20"></div>
                    </div>
                    <div class="h-32 flex items-center justify-center bg-green-900/10 border-b border-green-900/30">
                        <img class="w-16 h-16 object-contain scale-110" src="images/stacks/stacks-javascript.png" alt="JS">
                    </div>
                    <div class="px-6 py-4 text-center">
                        <div class="font-bold text-green-500 text-xl font-cyber tracking-widest matrix-glow">JAVASCRIPT</div>
                    </div>
                </div>

            </div>










            <h2 class="text-green-500 font-matrix text-2xl mb-8 tracking-widest uppercase">> Tools & Environment</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

        <script>
        VANTA.NET({
          el: "#vanta-bg",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 1.00,
          scaleMobile: 1.00,
          color: 0x00ff41,
          backgroundColor: 0x0,
          points: 12.00,
          maxDistance: 22.00,
          spacing: 16.00
        })
    </script>    
</div>
    </main>
        </body>
           </html>
